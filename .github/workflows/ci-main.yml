name: CI Main

on:
  push:
    branches-ignore:
      - production
  pull_request:
    branches-ignore:
      - production

permissions:
  # OIDC auth to AWS requires id-token: write.
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1) detect changes, 2) test services, 3) integration smoke test, 4) push staging images.

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      changed_services_matrix: ${{ steps.set-matrix.outputs.changed_services_matrix }}
      full_services_matrix: ${{ steps.set-matrix.outputs.full_services_matrix }}
      any_service_changed: ${{ steps.set-matrix.outputs.any_service_changed }}
      is_staging: ${{ steps.set-matrix.outputs.is_staging }}
      target_environment: ${{ steps.set-matrix.outputs.target_environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            account-service:
              - 'account-service/**'
            api-gateway-service:
              - 'api-gateway-service/**'
            bank-service:
              - 'bank-service/**'
            credit-card-service:
              - 'credit-card-service/**'
            discovery-client-service:
              - 'discovery-client-service/**'
            invoice-service:
              - 'invoice-service/**'
            log-service:
              - 'log-service/**'
            user-service:
              - 'user-service/**'
            integration:
              - 'docker-compose.yml'
              - '.github/workflows/**'

      - name: Build dynamic matrix
        id: set-matrix
        run: |
          set -euo pipefail

          services_all=(
            account-service
            api-gateway-service
            bank-service
            credit-card-service
            discovery-client-service
            invoice-service
            log-service
            user-service
          )

          services=()

          [[ "${{ steps.changes.outputs.account-service }}" == "true" ]] && services+=("account-service")
          [[ "${{ steps.changes.outputs.api-gateway-service }}" == "true" ]] && services+=("api-gateway-service")
          [[ "${{ steps.changes.outputs.bank-service }}" == "true" ]] && services+=("bank-service")
          [[ "${{ steps.changes.outputs.credit-card-service }}" == "true" ]] && services+=("credit-card-service")
          [[ "${{ steps.changes.outputs.discovery-client-service }}" == "true" ]] && services+=("discovery-client-service")
          [[ "${{ steps.changes.outputs.invoice-service }}" == "true" ]] && services+=("invoice-service")
          [[ "${{ steps.changes.outputs.log-service }}" == "true" ]] && services+=("log-service")
          [[ "${{ steps.changes.outputs.user-service }}" == "true" ]] && services+=("user-service")

          target_branch="${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}"

          if [[ "$target_branch" == "main" || "$target_branch" == "master" ]]; then
            target_environment="staging"
            full_matrix_json="$(printf '%s\n' "${services_all[@]}" | jq -R . | jq -sc .)"
          else
            target_environment="dev"
            full_matrix_json="$(printf '%s\n' "${services[@]}" | jq -R . | jq -sc .)"
          fi

          if [[ ${#services[@]} -eq 0 ]]; then
            changed_matrix_json='[]'
            any_service_changed=false
          else
            changed_matrix_json="$(printf '%s\n' "${services[@]}" | jq -R . | jq -sc .)"
            any_service_changed=true
          fi

          echo "changed_services_matrix=$changed_matrix_json" >> "$GITHUB_OUTPUT"
          echo "full_services_matrix=$full_matrix_json" >> "$GITHUB_OUTPUT"
          echo "any_service_changed=$any_service_changed" >> "$GITHUB_OUTPUT"
          echo "is_staging=$([[ \"$target_environment\" == \"staging\" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "target_environment=$target_environment" >> "$GITHUB_OUTPUT"

  test-services:
    name: Test Services
    uses: ./.github/workflows/r-test-and-scan-code.yml
    needs:
      - detect-changes
    if: needs.detect-changes.outputs.is_staging == 'true' || needs.detect-changes.outputs.any_service_changed == 'true'
    with:
      services_matrix: ${{ needs.detect-changes.outputs.is_staging == 'true' && needs.detect-changes.outputs.full_services_matrix || needs.detect-changes.outputs.changed_services_matrix }}
    secrets: inherit

  integration-compose:
    name: Integration Test
    uses: ./.github/workflows/r-integration-test.yml
    needs:
      - detect-changes
      - test-services
    if: needs.detect-changes.outputs.is_staging == 'true'
    with:
      services_matrix: ${{ needs.detect-changes.outputs.full_services_matrix }}
    secrets: inherit

  build-and-push-ecr:
    name: Build and Push Images
    uses: ./.github/workflows/r-build-scan-push.yml
    needs:
      - detect-changes
      - integration-compose
    if: github.event_name == 'push' && needs.detect-changes.outputs.is_staging == 'true'
    with:
      services_matrix: ${{ needs.detect-changes.outputs.full_services_matrix }}
      ref: ${{ github.ref }}
      event_name: ${{ github.event_name }}
    secrets: inherit

  sync-gitops-values:
    name: Sync GitOps Staging Values
    uses: ./.github/workflows/r-sync-gitops-values.yml
    needs:
      - detect-changes
      - build-and-push-ecr
    if: github.event_name == 'push' && needs.detect-changes.outputs.is_staging == 'true'
    with:
      services_matrix: ${{ needs.detect-changes.outputs.full_services_matrix }}
      image_tag: ${{ github.sha }}
      target_environment: staging
      gitops_repository: LeDangQuocAn/banking-gitops
    secrets: inherit
