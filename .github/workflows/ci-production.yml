name: CI Production

on:
  pull_request:
    branches:
      - production
    types:
      - closed

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      changed_services_matrix: ${{ steps.set-matrix.outputs.changed_services_matrix }}
      any_service_changed: ${{ steps.set-matrix.outputs.any_service_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            account-service:
              - 'account-service/**'
            api-gateway-service:
              - 'api-gateway-service/**'
            bank-service:
              - 'bank-service/**'
            credit-card-service:
              - 'credit-card-service/**'
            discovery-client-service:
              - 'discovery-client-service/**'
            invoice-service:
              - 'invoice-service/**'
            log-service:
              - 'log-service/**'
            user-service:
              - 'user-service/**'
            integration:
              - 'docker-compose.yml'
              - '.github/workflows/**'

      - name: Build changed-service matrix
        id: set-matrix
        run: |
          set -euo pipefail

          services=()

          [[ "${{ steps.changes.outputs.account-service }}" == "true" ]] && services+=("account-service")
          [[ "${{ steps.changes.outputs.api-gateway-service }}" == "true" ]] && services+=("api-gateway-service")
          [[ "${{ steps.changes.outputs.bank-service }}" == "true" ]] && services+=("bank-service")
          [[ "${{ steps.changes.outputs.credit-card-service }}" == "true" ]] && services+=("credit-card-service")
          [[ "${{ steps.changes.outputs.discovery-client-service }}" == "true" ]] && services+=("discovery-client-service")
          [[ "${{ steps.changes.outputs.invoice-service }}" == "true" ]] && services+=("invoice-service")
          [[ "${{ steps.changes.outputs.log-service }}" == "true" ]] && services+=("log-service")
          [[ "${{ steps.changes.outputs.user-service }}" == "true" ]] && services+=("user-service")

          if [[ ${#services[@]} -eq 0 ]]; then
            echo "changed_services_matrix=[]" >> "$GITHUB_OUTPUT"
            echo "any_service_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          matrix_json="$(printf '%s\n' "${services[@]}" | jq -R . | jq -sc .)"
          echo "changed_services_matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "any_service_changed=true" >> "$GITHUB_OUTPUT"

  promote-images:
    name: Promote Images to Production
    uses: ./.github/workflows/r-promote-ecr-image.yml
    needs:
      - detect-changes
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'main' && needs.detect-changes.outputs.any_service_changed == 'true'
    with:
      services_matrix: ${{ needs.detect-changes.outputs.changed_services_matrix }}
      source_environment: staging
      target_environment: prod
      source_image_tag: ${{ github.event.pull_request.head.sha }}
    secrets: inherit

  sync-gitops-values:
    name: Sync GitOps Production Values
    uses: ./.github/workflows/r-sync-gitops-values.yml
    needs:
      - detect-changes
      - promote-images
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'main' && needs.detect-changes.outputs.any_service_changed == 'true'
    with:
      services_matrix: ${{ needs.detect-changes.outputs.changed_services_matrix }}
      image_tag: ${{ github.event.pull_request.head.sha }}
      target_environment: prod
      gitops_repository: LeDangQuocAn/banking-gitops
    secrets: inherit