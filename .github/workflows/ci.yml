name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  # OIDC auth to AWS requires id-token: write.
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1) detect changes, 2) test changed services, 3) optional integration smoke test, 4) push changed images.

  detect-changes:
    # Produces a dynamic matrix so later jobs run only for changed services.
    name: Detect Changed Services
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      services_matrix: ${{ steps.set-matrix.outputs.services_matrix }}
      any_service_changed: ${{ steps.set-matrix.outputs.any_service_changed }}
      integration_required: ${{ steps.set-matrix.outputs.integration_required }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            account-service:
              - 'account-service/**'
            api-gateway-service:
              - 'api-gateway-service/**'
            bank-service:
              - 'bank-service/**'
            credit-card-service:
              - 'credit-card-service/**'
            discovery-client-service:
              - 'discovery-client-service/**'
            invoice-service:
              - 'invoice-service/**'
            log-service:
              - 'log-service/**'
            user-service:
              - 'user-service/**'
            integration:
              - 'docker-compose.yml'
              - '.github/workflows/ci.yml'

      - name: Build dynamic matrix
        id: set-matrix
        run: |
          set -euo pipefail

          services=()

          [[ "${{ steps.changes.outputs.account-service }}" == "true" ]] && services+=("account-service")
          [[ "${{ steps.changes.outputs.api-gateway-service }}" == "true" ]] && services+=("api-gateway-service")
          [[ "${{ steps.changes.outputs.bank-service }}" == "true" ]] && services+=("bank-service")
          [[ "${{ steps.changes.outputs.credit-card-service }}" == "true" ]] && services+=("credit-card-service")
          [[ "${{ steps.changes.outputs.discovery-client-service }}" == "true" ]] && services+=("discovery-client-service")
          [[ "${{ steps.changes.outputs.invoice-service }}" == "true" ]] && services+=("invoice-service")
          [[ "${{ steps.changes.outputs.log-service }}" == "true" ]] && services+=("log-service")
          [[ "${{ steps.changes.outputs.user-service }}" == "true" ]] && services+=("user-service")

          if [[ ${#services[@]} -eq 0 ]]; then
            echo "services_matrix=[]" >> "$GITHUB_OUTPUT"
            echo "any_service_changed=false" >> "$GITHUB_OUTPUT"
            if [[ "${{ steps.changes.outputs.integration }}" == "true" ]]; then
              echo "integration_required=true" >> "$GITHUB_OUTPUT"
            else
              echo "integration_required=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          matrix_json="$(printf '%s\n' "${services[@]}" | jq -R . | jq -sc .)"
          echo "services_matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "any_service_changed=true" >> "$GITHUB_OUTPUT"
          echo "integration_required=true" >> "$GITHUB_OUTPUT"

  test-services:
    # Fast feedback: per-service tests in parallel for changed services only.
    name: Unit and Context Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - detect-changes
    if: needs.detect-changes.outputs.any_service_changed == 'true'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: banking-microservices
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets['CI_POSTGRES_PASSWORD'] || 'admin38' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d banking-microservices"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: admin
          RABBITMQ_DEFAULT_PASS: ${{ secrets['CI_RABBITMQ_PASSWORD'] || 'admin38' }}
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: an
          MONGO_INITDB_ROOT_PASSWORD: ${{ secrets['CI_MONGODB_PASSWORD'] || 'an123' }}
          MONGO_INITDB_DATABASE: banking-microservices
        ports:
          - 27017:27017
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${{ secrets['CI_POSTGRES_PASSWORD'] || 'admin38' }}
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_DB: 0
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: ${{ secrets['CI_RABBITMQ_PASSWORD'] || 'admin38' }}
      MONGODB_HOST: localhost
      MONGODB_PORT: 27017
      MONGODB_DB: banking-microservices
      MONGODB_USER: an
      MONGODB_PASSWORD: ${{ secrets['CI_MONGODB_PASSWORD'] || 'an123' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services_matrix) }}

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: ${{ matrix.service }}/pom.xml

      - name: Ensure Maven wrapper is executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B test

  integration-compose:
    # End-to-end smoke check of the composed stack (push events only).
    name: Integration Smoke Test (Docker Compose)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - detect-changes
      - test-services
    if: needs.detect-changes.outputs.integration_required == 'true' && github.event_name == 'push'
    env:
      POSTGRES_PASSWORD: ${{ secrets['CI_POSTGRES_PASSWORD'] || 'admin38' }}
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: ${{ secrets['CI_RABBITMQ_PASSWORD'] || 'admin38' }}
      MONGODB_USER: an
      MONGODB_PASSWORD: ${{ secrets['CI_MONGODB_PASSWORD'] || 'an123' }}
      PGADMIN_DEFAULT_EMAIL: ${{ secrets['CI_PGADMIN_EMAIL'] || 'pgadmin@example.com' }}
      PGADMIN_DEFAULT_PASSWORD: ${{ secrets['CI_PGADMIN_PASSWORD'] || 'admin' }}
      MONGO_EXPRESS_USER: ${{ secrets['CI_MONGO_EXPRESS_USER'] || 'admin' }}
      MONGO_EXPRESS_PASSWORD: ${{ secrets['CI_MONGO_EXPRESS_PASSWORD'] || 'admin' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and start core stack
        run: |
          docker compose up -d --build \
            discovery-client-service \
            api-gateway-service \
            user-service \
            bank-service \
            credit-card-service \
            account-service \
            invoice-service \
            log-service \
            postgres-db \
            redis-db \
            rabbitmq-log \
            mongo

      - name: Wait for service health endpoints
        run: |
          set -euo pipefail

          check_health() {
            local url="$1"
            local name="$2"
            local retries=60
            local delay=10

            for i in $(seq 1 "$retries"); do
              if curl -fsS "$url" > /dev/null; then
                echo "$name is healthy"
                return 0
              fi
              echo "[$i/$retries] waiting for $name..."
              sleep "$delay"
            done

            echo "$name failed to become healthy"
            docker compose ps
            return 1
          }

          check_health "http://localhost:8761/actuator/health" "discovery-client-service"
          check_health "http://localhost:8087/actuator/health" "api-gateway-service"
          check_health "http://localhost:8081/actuator/health" "user-service"
          check_health "http://localhost:8082/actuator/health" "bank-service"
          check_health "http://localhost:8083/actuator/health" "credit-card-service"
          check_health "http://localhost:8084/actuator/health" "account-service"
          check_health "http://localhost:8085/actuator/health" "invoice-service"
          check_health "http://localhost:8086/actuator/health" "log-service"

      - name: Show running containers
        if: always()
        run: docker compose ps

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  build-and-push-ecr:
    # Publish changed service images to ECR using OIDC and matrix build.
    name: Build and Push Image (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - detect-changes
      - integration-compose
    # Temporary gate for branch testing; switch to main when ready.
    if: github.event_name == 'push' && github.ref == 'refs/heads/feature/cicd-pipeline' && needs.detect-changes.outputs.any_service_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECR_OIDC }}
          role-session-name: github-actions-ecr
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare ECR repository name
        id: prep-ecr
        env:
          REPO_PREFIX_RAW: ${{ vars.ECR_REPOSITORY_PREFIX || 'banking-microservices' }}
          REPO_ENV_RAW: ${{ vars.ECR_ENVIRONMENT || 'dev' }}
        run: |
          set -euo pipefail

          sanitize() {
            printf '%s' "$1" | tr -d '\r\n\t ' | tr '[:upper:]' '[:lower:]'
          }

          repo_prefix="$(sanitize "$REPO_PREFIX_RAW")"
          repo_env="$(sanitize "$REPO_ENV_RAW")"
          service_name="$(sanitize "${{ matrix.service }}")"
          repository_name="${repo_prefix}-${repo_env}-${service_name}"

          echo "repository_name=$repository_name" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repository exists
        env:
          REPOSITORY_NAME: ${{ steps.prep-ecr.outputs.repository_name }}
        run: |
          aws ecr describe-repositories --repository-names "$REPOSITORY_NAME" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$REPOSITORY_NAME" >/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          file: ${{ matrix.service }}/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ steps.prep-ecr.outputs.repository_name }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ steps.prep-ecr.outputs.repository_name }}:latest