name: Reusable Build Scan and Push

on:
  workflow_call:
    inputs:
      services_matrix:
        description: 'JSON array of services to build and push'
        required: true
        type: string
      ref:
        description: 'Git ref (branch/tag) to deploy'
        required: true
        type: string
      event_name:
        description: 'GitHub event name (push/pull_request)'
        required: true
        type: string
    secrets:
      ECR_OIDC:
        required: true

jobs:
  build-and-push-ecr:
    name: Build and Push Image (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(inputs.services_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECR_OIDC }}
          role-session-name: github-actions-ecr
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare ECR repository name
        id: prep-ecr
        env:
          REPO_PREFIX_RAW: ${{ vars.ECR_REPOSITORY_PREFIX || 'banking-microservices' }}
          REPO_ENV_RAW: staging
        run: |
          set -euo pipefail

          sanitize() {
            printf '%s' "$1" | tr -d '\r\n\t ' | tr '[:upper:]' '[:lower:]'
          }

          repo_prefix="$(sanitize "$REPO_PREFIX_RAW")"
          repo_env="$(sanitize "$REPO_ENV_RAW")"
          service_name="$(sanitize "${{ matrix.service }}")"
          repository_name="${repo_prefix}-${repo_env}-${service_name}"

          echo "repository_name=$repository_name" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repository exists
        env:
          REPOSITORY_NAME: ${{ steps.prep-ecr.outputs.repository_name }}
        run: |
          aws ecr describe-repositories --repository-names "$REPOSITORY_NAME" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$REPOSITORY_NAME" >/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for Trivy scan
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          file: ${{ matrix.service }}/Dockerfile
          push: false
          load: true
          cache-from: |
            type=gha
            type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ steps.prep-ecr.outputs.repository_name }}:latest
          cache-to: type=gha,mode=max
          tags: ${{ steps.prep-ecr.outputs.repository_name }}:local-test

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.prep-ecr.outputs.repository_name }}:local-test
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          file: ${{ matrix.service }}/Dockerfile
          push: true
          cache-from: |
            type=gha
            type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ steps.prep-ecr.outputs.repository_name }}:latest
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ steps.prep-ecr.outputs.repository_name }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ steps.prep-ecr.outputs.repository_name }}:latest
